name: SalviaFeri Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '🔗 لینک‌های دانلود (چند لینک با فاصله)'
        required: true
        type: string
      password:
        description: '🔒 رمز ZIP (اختیاری)'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: راه‌اندازی WARP
        run: |
          docker network create warp-net 2>/dev/null || true
          docker run -d --name warp --restart=always --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "⏳ Waiting for WARP..."
          sleep 15
          for i in 1 2 3 4 5; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 \
              https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP active"; break
            else
              echo "Attempt $i/5..."; sleep 5
            fi
          done

      - name: نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 zip unzip p7zip-full ffmpeg curl jq
          pip install yt-dlp --quiet

      - name: آماده‌سازی گیت و پوشه Downloads
        run: |
          git config user.name "SalviaFeri[bot]"
          git config user.email "salviaferi@local"
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard origin/"${GITHUB_REF_NAME}"
          mkdir -p Downloads

      - name: پردازش و دانلود
        env:
          INPUT_URLS: ${{ github.event.inputs.urls }}
          INPUT_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          urls_raw="${INPUT_URLS}"
          password="${INPUT_PASSWORD}"
          read -ra url_array <<< "$urls_raw"
          
          index=1
          total_success=0
          max_file_size=1073741824  # 1GB
          split_size_mb=90
          split_threshold=$((100 * 1024 * 1024))

          for url in "${url_array[@]}"; do
            echo ""
            echo "══════════════════════════════════"
            echo "📥 #${index}: ${url}"
            echo "══════════════════════════════════"

            is_stream=false
            if echo "$url" | grep -qiE "(youtube\.com|youtu\.be|aparat\.com|instagram\.com|tiktok\.com|twitter\.com|x\.com|vimeo\.com)"; then
              is_stream=true
            fi

            if $is_stream; then
              echo "🎬 سایت استریم - استخراج لینک مستقیم..."

              # استخراج لینک مستقیم (با پروکسی)
              direct_url=$(yt-dlp -g --proxy "socks5://127.0.0.1:1080" \
                --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                --no-playlist --no-check-certificates "$url" 2>/dev/null | head -1)

              if [ -n "$direct_url" ]; then
                echo "  🎯 لینک مستقیم: ${direct_url:0:80}..."
                aria2c -x 16 -s 16 --console-log-level=error \
                  --all-proxy="socks5://127.0.0.1:1080" \
                  "$direct_url" -o "temp_${index}"
              else
                echo "  ⚠️ استخراج لینک ناموفق، تلاش با yt-dlp مستقیم..."
                yt-dlp --proxy "socks5://127.0.0.1:1080" \
                  -f "best[height<=1080]/best" --merge-output-format mp4 \
                  -o "temp_${index}.%(ext)s" --no-playlist \
                  --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
                  "$url" 2>&1 | tail -3
              fi

              # فایل را پیدا کن
              filename=$(ls "temp_${index}".* "temp_${index}" 2>/dev/null | head -1)
              [ -z "$filename" ] && filename="temp_${index}"
            else
              echo "📄 لینک مستقیم"
              filesize=$(curl -sI --max-time 15 "$url" 2>/dev/null | grep -i content-length | awk 'END{print $2}' | tr -d '\r')
              if [ -n "$filesize" ] && [ "$filesize" -gt "$max_file_size" ]; then
                echo "❌ حجم ${filesize} بایت > 1GB - رد شد"
                index=$((index+1)); continue
              fi
              aria2c -x 16 -s 16 --console-log-level=error "$url" -o "temp_${index}"
              filename="temp_${index}"
            fi

            # بررسی موفقیت
            if [ ! -f "$filename" ] || [ $(stat -c%s "$filename") -lt 1000 ]; then
              echo "❌ فایل دانلود نشد یا بسیار کوچک است (احتمالاً صفحه وب)"
              rm -f "$filename"
              index=$((index+1)); continue
            fi

            actual_size=$(stat -c%s "$filename")
            echo "✅ دریافت شد: $(echo "scale=2; $actual_size/1048576" | bc)MB"

            # ZIP کردن
            timestamp=$(date +%Y%m%d_%H%M%S)
            zip_base="SF_${timestamp}_${index}"
            if [ -n "$password" ]; then
              zip --password "$password" "${zip_base}.zip" "$filename" > /dev/null 2>&1
            else
              zip "${zip_base}.zip" "$filename" > /dev/null 2>&1
            fi

            zip_size=$(stat -c%s "${zip_base}.zip" 2>/dev/null || echo 0)
            if [ "$zip_size" -gt "$split_threshold" ]; then
              echo "🔪 تقسیم به پارت‌های ${split_size_mb}MB"
              mkdir -p "split_${index}"
              (cd "split_${index}" && 7z a -v${split_size_mb}m "../${zip_base}_part.zip" "../${zip_base}.zip" > /dev/null 2>&1)
              rm -f "${zip_base}.zip"
              for part in "${zip_base}_part.zip"*; do
                [ -f "$part" ] && mv "$part" Downloads/
              done
            else
              mv "${zip_base}.zip" Downloads/
            fi

            rm -f "$filename"
            rm -rf "split_${index}"
            total_success=$((total_success+1))
            index=$((index+1))
          done

          echo "✅ موفق: ${total_success} از $((index-1))"

      - name: ساخت index.html
        run: |
          cat > Downloads/index.html << 'HEAD'
          <!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><title>SalviaFeri</title>
          <style>body { font-family: Tahoma; background: #1a1a2e; color: #eee; max-width: 700px; margin: 40px auto; padding: 20px; }
          h1 { color: #e94560; } .file { background: #16213e; margin: 10px 0; padding: 15px; border-radius: 8px; border-right: 4px solid #e94560; }
          .file a { color: #0f3460; background: #e94560; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-weight: bold; }
          .file a:hover { background: #ff6b6b; }</style></head><body><h1>📁 فایل‌های دانلود شده</h1>
          HEAD
          for f in Downloads/*; do
            [ -f "$f" ] || continue
            fn=$(basename "$f")
            sz=$(stat -c%s "$f")
            sz_mb=$(echo "scale=1; $sz/1048576" | bc)
            enc=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$fn'))")
            raw="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/Downloads/${enc}"
            echo "<div class=\"file\"><strong>${fn}</strong> (${sz_mb} MB) <a href=\"${raw}\">⬇️ دانلود</a></div>" >> Downloads/index.html
          done
          echo '</body></html>' >> Downloads/index.html

      - name: پاکسازی پوشه اضافی
        run: |
          max_size=$((900 * 1024 * 1024))
          total=$(du -sb Downloads | cut -f1)
          while [ "$total" -gt "$max_size" ]; do
            oldest=$(ls -t Downloads/*.zip* Downloads/*.part* 2>/dev/null | tail -1)
            [ -z "$oldest" ] && break
            sz_old=$(stat -c%s "$oldest")
            rm -f "$oldest"
            total=$((total - sz_old))
            echo "🗑️ حذف $(basename "$oldest") برای حفظ فضا"
          done

      - name: Commit و Push
        run: |
          git add -A Downloads/
          if git diff --cached --quiet; then
            echo "ℹ️ تغییری نیست"
          else
            git commit -m "✨ SalviaFeri: $(date '+%Y-%m-%d %H:%M')"
            for i in 1 2 3 4 5; do
              if timeout 300 git push origin "${GITHUB_REF_NAME}"; then
                echo "✅ Push"; break
              else
                sleep 5
                git fetch origin "${GITHUB_REF_NAME}"
                git reset --hard origin/"${GITHUB_REF_NAME}"
              fi
            done
          fi

      - name: توقف WARP
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true
