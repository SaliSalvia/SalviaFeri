name: Cleanup Downloads - SalviaFeri

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: پاکسازی پوشه Downloads
        run: |
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard origin/"${GITHUB_REF_NAME}"
          rm -rf Downloads
          mkdir -p Downloads
          echo '<html><body><h1>پوشه Downloads خالی است</h1></body></html>' > Downloads/index.html

      - name: ارسال به گیت‌هاب
        run: |
          git config user.name "SalviaFeri[bot]"
          git config user.email "salviaferi@local"
          git add -A Downloads/
          git commit -m "🧹 پاکسازی کامل Downloads" || echo "بدون تغییر"
          git push origin "${GITHUB_REF_NAME}"
